[manager]
ratio          = [1, 3, 4]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "size"
show_hidden    = false
show_symlink   = true

[preview]
tab_size     = 2
max_width    = 600
max_height   = 900
image_filter = "triangle"
image_quality = 75

[opener]
edit = [
  { run = '$EDITOR "$@"', desc = "Editar", block = true },
]
open = [
  { run = 'xdg-open "$@"', desc = "Abrir", orphan = true },
]
reveal = [
  { run = 'nautilus "$(dirname "$1")"', desc = "Mostrar en Nautilus", orphan = true },
]

[open]
rules = [
  { mime = "text/*",          use = ["edit", "open"] },
  { mime = "image/*",         use = ["open"] },
  { mime = "video/*",         use = ["open"] },
  { mime = "audio/*",         use = ["open"] },
  { mime = "inode/directory", use = ["open"] },
  { mime = "*",               use = ["open", "reveal"] },
]

[tasks]
micro_workers    = 10
macro_workers    = 5
bizarre_retry    = 5
image_alloc      = 536870912
image_bound      = [0, 0]
suppress_preload = false

[log]
enabled = false
