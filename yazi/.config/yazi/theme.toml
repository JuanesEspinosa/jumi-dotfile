# Catppuccin Mocha — yazi theme

[manager]
cwd             = { fg = "#89b4fa" }
hovered         = { fg = "#1e1e2e", bg = "#b4befe" }
preview_hovered = { underline = true }

find_keyword  = { fg = "#f9e2af", italic = true }
find_position = { fg = "#cba6f7", bg = "reset", italic = true }

marker_copied   = { fg = "#a6e3a1", bg = "#a6e3a1" }
marker_cut      = { fg = "#f38ba8", bg = "#f38ba8" }
marker_marked   = { fg = "#89dceb", bg = "#89dceb" }
marker_selected = { fg = "#f9e2af", bg = "#f9e2af" }

tab_active   = { fg = "#1e1e2e", bg = "#b4befe" }
tab_inactive = { fg = "#a6adc8", bg = "#313244" }

count_copied   = { fg = "#1e1e2e", bg = "#a6e3a1" }
count_cut      = { fg = "#1e1e2e", bg = "#f38ba8" }
count_marked   = { fg = "#1e1e2e", bg = "#89dceb" }
count_selected = { fg = "#1e1e2e", bg = "#f9e2af" }

border_symbol = "│"
border_style  = { fg = "#45475a" }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#313244", bg = "#313244" }

mode_normal = { fg = "#1e1e2e", bg = "#b4befe", bold = true }
mode_select = { fg = "#1e1e2e", bg = "#a6e3a1", bold = true }
mode_unset  = { fg = "#1e1e2e", bg = "#f38ba8", bold = true }

progress_label  = { fg = "#cdd6f4", bold = true }
progress_normal = { fg = "#89b4fa", bg = "#1e1e2e" }
progress_error  = { fg = "#f38ba8", bg = "#1e1e2e" }

perm_type  = { fg = "#89b4fa" }
perm_read  = { fg = "#f9e2af" }
perm_write = { fg = "#f38ba8" }
perm_exec  = { fg = "#a6e3a1" }
perm_sep   = { fg = "#45475a" }

[input]
border   = { fg = "#b4befe" }
title    = {}
value    = {}
selected = { reversed = true }

[select]
border   = { fg = "#b4befe" }
active   = { fg = "#cba6f7" }
inactive = {}

[tasks]
border  = { fg = "#b4befe" }
title   = {}
hovered = { underline = true }

[which]
mask            = { bg = "#181825" }
cand            = { fg = "#89dceb" }
rest            = { fg = "#45475a" }
desc            = { fg = "#cba6f7" }
separator       = "  "
separator_style = { fg = "#45475a" }

[help]
on      = { fg = "#cba6f7" }
exec    = { fg = "#89dceb" }
desc    = { fg = "#a6adc8" }
hovered = { bg = "#313244", bold = true }
footer  = { fg = "#1e1e2e", bg = "#b4befe" }

[filetype]
rules = [
  { mime = "image/*",                     fg = "#89dceb" },
  { mime = "video/*",                     fg = "#cba6f7" },
  { mime = "audio/*",                     fg = "#f9e2af" },
  { mime = "application/pdf",             fg = "#f38ba8" },
  { mime = "application/zip",             fg = "#fab387" },
  { mime = "application/x-tar",           fg = "#fab387" },
  { mime = "application/x-bzip2",         fg = "#fab387" },
  { mime = "application/x-7z-compressed", fg = "#fab387" },
  { mime = "application/x-rar",           fg = "#fab387" },
  { mime = "application/x-xz",            fg = "#fab387" },
  { mime = "application/gzip",            fg = "#fab387" },
  { mime = "text/x-python",               fg = "#89b4fa" },
  { mime = "text/x-script.python",        fg = "#89b4fa" },
  { mime = "text/javascript",             fg = "#f9e2af" },
  { mime = "text/x-shellscript",          fg = "#a6e3a1" },
  { mime = "text/html",                   fg = "#fab387" },
  { mime = "text/css",                    fg = "#89b4fa" },
  { mime = "text/x-rust",                 fg = "#fab387" },
  { mime = "text/x-go",                   fg = "#89dceb" },
  { mime = "text/markdown",               fg = "#a6adc8" },
  { mime = "text/*",                      fg = "#cdd6f4" },
  { mime = "inode/directory",             fg = "#b4befe" },
  { mime = "application/x-executable",   fg = "#a6e3a1" },
]
