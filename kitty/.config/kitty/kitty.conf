# kitty.conf — Catppuccin Mocha

# ── Fuente ─────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
font_size        12.0

# ── Ventana ────────────────────────────────────────────────────────────────
window_padding_width 12
hide_window_decorations yes
confirm_os_window_close 0

# ── Cursor ─────────────────────────────────────────────────────────────────
cursor_shape block
cursor_blink_interval 0

# ── Rendimiento ────────────────────────────────────────────────────────────
repaint_delay    10
input_delay      2
sync_to_monitor  yes

# ── Colores Catppuccin Mocha ───────────────────────────────────────────────
foreground              #CDD6F4
background              #1E1E2E
selection_foreground    #1E1E2E
selection_background    #F5E0DC

cursor                  #F5E0DC
cursor_text_color       #1E1E2E

url_color               #F5E0DC

# Colores normales
color0  #45475A
color1  #F38BA8
color2  #A6E3A1
color3  #F9E2AF
color4  #89B4FA
color5  #F5C2E7
color6  #94E2D5
color7  #BAC2DE

# Colores brillantes
color8  #585B70
color9  #F38BA8
color10 #A6E3A1
color11 #F9E2AF
color12 #89B4FA
color13 #F5C2E7
color14 #94E2D5
color15 #A6ADC8
