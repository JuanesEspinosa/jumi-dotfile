# tmux.conf — Catppuccin Mocha

# Prefijo → Ctrl+A
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Splits intuitivos
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navegacion vim-style entre paneles
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Redimensionar paneles
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Mouse
set -g mouse on

# Indexar desde 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Terminal con color verdadero
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Sin delay al presionar Escape
set -s escape-time 0

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config recargado"

# ── Colores Catppuccin Mocha ───────────────────────────────────────────────
color_bg="#1e1e2e"
color_surface="#313244"
color_text="#cdd6f4"
color_subtext="#a6adc8"
color_mauve="#cba6f7"
color_blue="#89b4fa"
color_green="#a6e3a1"

set -g status-style "bg=$color_bg,fg=$color_text"
set -g status-left "#[bg=$color_mauve,fg=$color_bg,bold] #S #[default] "
set -g status-right "#[fg=$color_subtext] %H:%M  %d/%m "
set -g status-left-length 30

setw -g window-status-format "#[fg=$color_subtext] #I #W "
setw -g window-status-current-format "#[bg=$color_surface,fg=$color_blue,bold] #I #W "

set -g pane-border-style "fg=$color_surface"
set -g pane-active-border-style "fg=$color_mauve"

set -g message-style "bg=$color_surface,fg=$color_text"
