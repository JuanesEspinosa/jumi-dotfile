# Animaciones

animations {
    enabled = true

    bezier = easeOut, 0.16, 1, 0.3, 1
    bezier = easeInOut, 0.87, 0, 0.13, 1

    animation = windows, 1, 4, easeOut, slide
    animation = windowsOut, 1, 4, easeOut, slide
    animation = border, 1, 6, default
    animation = fade, 1, 4, easeInOut
    animation = workspaces, 1, 4, easeInOut, slide
}
