# Variables de entorno para Wayland

env = PATH,$HOME/.local/bin:/usr/local/bin:/usr/bin:/bin
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_PATH,$HOME/.local/share/icons:$HOME/.icons:/usr/share/icons
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,kvantum
env = QT_STYLE_OVERRIDE,kvantum
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
# GTK_THEME se genera en themes/current.conf via generators/hyprland.sh — no editar aqui
